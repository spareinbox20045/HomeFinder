<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartHome Finder</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <!-- Optional custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-gradient-to-r from-indigo-900 via-purple-800 to-pink-700 text-white font-[Poppins]">

    <!-- 🔝 Navbar -->
    <nav class="bg-white/10 backdrop-blur-lg shadow-md p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">

            <a href="/" class="text-xl font-bold tracking-wide ">
                🏠 Smart Home Finder
            </a>

            <a href="/" class="bg-orange-500 px-4 py-2 rounded-lg hover:bg-orange-600 transition">
                Home
            </a>

        </div>
    </nav>

    <!-- 📦 Content -->
    <div class="max-w-6xl mx-auto p-6">
        {% block content %}{% endblock %}
    </div>

</body>

</html>
